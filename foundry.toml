[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = '0.8.34'
optimizer = true
optimizer_runs = 200
evm_version = 'cancun'
ffi = true
fs_permissions = [
    { access = "read", path = "./script/input/" },
    { access = "read-write", path = "./script/output/"}
]

[fuzz]
runs = 1000

[etherscan]
mainnet      = { key = "${MAINNET_API_KEY}" }
base         = { key = "${BASESCAN_API_KEY}" }
arbitrum_one = { key = "${ARBISCAN_API_KEY}" }
avalanche    = { key = "${SNOWTRACE_API_KEY}" }
