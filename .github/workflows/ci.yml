name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run tests
        env:
          MAINNET_RPC_URL: ${{secrets.MAINNET_RPC_URL}}
          ETHERSCAN_API_KEY: ${{secrets.ETHERSCAN_API_KEY}}
        run: forge --version && forge t -vv

      - name: Debug AaveFacet build
        if: always()
        run: |
          echo "=== forge config (relevant parts) ==="
          forge config --json | python3 -c "import json,sys; d=json.load(sys.stdin); [print(f'{k}: {d.get(k)}') for k in ['solc','evm_version','via_ir','bytecode_hash','optimizer','optimizer_runs']]"
          echo "=== AaveFacet metadata settings ==="
          python3 -c "import json; d=json.load(open('out/AaveFacet.sol/AaveFacet.json')); s=d['metadata']['settings']; print('compiler:', d['metadata']['compiler']); print('compilationTarget:', s['compilationTarget']); print('evmVersion:', s['evmVersion']); print('optimizer:', s['optimizer']); print('metadata:', s.get('metadata')); print('libraries:', s.get('libraries'))"
          echo "=== AaveFacet remappings ==="
          python3 -c "import json; d=json.load(open('out/AaveFacet.sol/AaveFacet.json')); [print(r) for r in d['metadata']['settings']['remappings']]"
          echo "=== AaveFacet source keccaks ==="
          python3 -c "import json; d=json.load(open('out/AaveFacet.sol/AaveFacet.json')); [print(f'{k}: {v[\"keccak256\"]}') for k,v in sorted(d['metadata']['sources'].items())]"
          echo "=== AaveFacet runtime bytecode tail (last 200 hex chars = metadata trailer) ==="
          python3 -c "import json; d=json.load(open('out/AaveFacet.sol/AaveFacet.json')); print(d['deployedBytecode']['object'][-200:])"

      - name: Upload AaveFacet artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AaveFacet-artifact
          path: out/AaveFacet.sol/AaveFacet.json
